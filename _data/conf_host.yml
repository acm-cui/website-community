preamble: For its tenth iteration, the Conversational User Interfaces conference steering committee are looking for bids to host the conference in 2028. This is an ACM SIGCHI conference that attracts over 100–150 delegates and focuses on showcasing cutting edge human-computer interaction research in the field of language models, speech interfaces, chatbots and other language based interaction paradigms.
postamble: If you are interested in hosting the 2028 conference, please submit a complete bid. </p><p>Before preparing your submission, we strongly encourage prospective bidders to review the <a href="https://docs.google.com/document/d/1X5Cl9YYgkXy9UCdiTS-iwMH2A4uGX4mzIMtYjhyLmoU/edit?usp=sharing">Bid Guidelines</a>, the <a href="https://docs.google.com/document/d/1R8SplYtSzMoYiRQFgmeTXk-pyyjoFnKiBxECZG8BUi0/edit?usp=sharing">Bid FAQ</a>, and the <a href="https://docs.google.com/document/d/1tsG59MfCzetvvpJUpR-xWERSaoQSBWX2j2LtK3PPnMg/edit?usp=sharing">CUI Bidding Template</a>.</p><p>Completed bids should be submitted to <a href="mailto:contact@cui.acm.org">contact@cui.acm.org</a>. The Steering Committee will review all submitted bids and make a collective decision on the strongest bid, which is most likely to guarantee a successful conference that at least breaks even in terms of budget.</p><p>We will then be in touch and will work with the selected bidder(s) towards completing <a href="https://sigchi.org/resources/guides-for-organizers/organising-a-sigchi-sponsored-or-co-sponsored-conference/">the ACM SIGCHI application process</a>.</p><p><strong>The deadline for bid submissions is 18 September 2026.</strong></p><p>If you have any questions, please reach out to the Steering Committee Chairs and Secretary at <a href="mailto:contact@cui.acm.org">contact@cui.acm.org</a>.</p>
